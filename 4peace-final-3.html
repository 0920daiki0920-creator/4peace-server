// ── ゲームロジック ──
function createDeck(){
  const d=[];
  while(d.length<10){
    const v=Math.floor(Math.random()*5)+1;
    if(d.filter(x=>x===v).length<3)d.push(v);
  }
  return d.sort(()=>Math.random()-0.5);
}

function calcPts(cards){
  const s=[...cards].sort((a,b)=>a-b);
  if(cards.length===4&&s.join('')==='1234')return{total:5,label:'ストレート +5pt',voice:'ストレート'};
  if(cards.length===2&&s[0]===5&&s[1]===5)return{total:1,label:'ノーボーナス +1pt',voice:''};
  const freq={};
  cards.forEach(v=>{freq[v]=(freq[v]||0)+1;});
  const counts=Object.values(freq);
  if(counts.some(c=>c>=3))return{total:4,label:'スリーカード +4pt',voice:'スリーカード'};
  if(counts.filter(c=>c===2).length>=2)return{total:3,label:'ツーペア +3pt',voice:'ツーペア'};
  if(counts.some(c=>c===2))return{total:2,label:'ワンペア +2pt',voice:'ワンペア'};
  return{total:1,label:'ノーボーナス +1pt',voice:''};
}

function canPlay(v,fieldSum,field){
  const filled=field.filter(x=>x!==null).length+1;
  const newSum=fieldSum+v;
  if(filled===3&&newSum<5)return false;
  if(filled===4&&newSum<10)return false;
  return true;
}

let bgmRunning=false,bgmTimers=[];
function stopBGM(){bgmRunning=false;bgmTimers.forEach(id=>clearTimeout(id));bgmTimers=[];}
function startBGM(){
  if(bgmRunning)return;bgmRunning=true;
  const SR=AC.sampleRate,BPM=132,beat=60/BPM;
  const mst=AC.createDynamicsCompressor();mst.threshold.value=-8;mst.ratio.value=8;mst.attack.value=0.003;mst.release.value=0.25;mst.connect(AC.destination);
  const lim=AC.createDynamicsCompressor();lim.threshold.value=-2;lim.ratio.value=20;lim.connect(mst);
  function mkRev(sec,dec){const n=Math.floor(SR*sec),b=AC.createBuffer(2,n,SR);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dec);}const cv=AC.createConvolver();cv.buffer=b;return cv;}
  const rev=mkRev(2,3),rg=AC.createGain();rg.gain.value=0.12;rev.connect(rg);rg.connect(mst);
  function kick(t){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(42,t+0.15);g.gain.setValueAtTime(1.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g);g.connect(lim);o.start(t);o.stop(t+0.32);const o2=AC.createOscillator(),g2=AC.createGain();o2.type='sine';o2.frequency.value=55;g2.gain.setValueAtTime(0.6,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.2);o2.connect(g2);g2.connect(lim);o2.start(t);o2.stop(t+0.22);}
  function snare(t){const n=Math.floor(SR*0.2),buf=AC.createBuffer(1,n,SR),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.8);const src=AC.createBufferSource(),g=AC.createGain(),hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=900;src.buffer=buf;src.connect(hp);hp.connect(g);g.connect(lim);g.connect(rev);g.gain.setValueAtTime(0.8,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);src.start(t);const ob=AC.createOscillator(),gb=AC.createGain();ob.type='triangle';ob.frequency.setValueAtTime(230,t);ob.frequency.exponentialRampToValueAtTime(90,t+0.1);gb.gain.setValueAtTime(0.35,t);gb.gain.exponentialRampToValueAtTime(0.001,t+0.12);ob.connect(gb);gb.connect(lim);ob.start(t);ob.stop(t+0.14);}
  function hh(t,vol){const n=Math.floor(SR*0.025),buf=AC.createBuffer(1,n,SR),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,4);const src=AC.createBufferSource(),g=AC.createGain(),hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=9000;src.buffer=buf;src.connect(hp);hp.connect(g);g.connect(mst);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);src.start(t);}
  function ohh(t){const n=Math.floor(SR*0.1),buf=AC.createBuffer(1,n,SR),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.5);const src=AC.createBufferSource(),g=AC.createGain(),hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;src.buffer=buf;src.connect(hp);hp.connect(g);g.connect(mst);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);src.start(t);}
  const bassSeq=[41,41,0,41,41,0,39,39,36,36,0,36,36,0,38,38];
  function bass(t,idx){const f=bassSeq[idx%bassSeq.length];if(!f)return;const freq=Math.pow(2,(f-69)/12)*440;const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;lp.Q.value=4;o.type='sawtooth';o.frequency.setValueAtTime(freq*1.03,t);o.frequency.linearRampToValueAtTime(freq,t+0.04);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.55,t+0.015);g.gain.setValueAtTime(0.55,t+beat*0.38);g.gain.exponentialRampToValueAtTime(0.001,t+beat*0.48);o.connect(lp);lp.connect(g);g.connect(lim);o.start(t);o.stop(t+beat*0.5);const os=AC.createOscillator(),gs=AC.createGain();os.type='sine';os.frequency.value=freq/2;gs.gain.setValueAtTime(0.4,t);gs.gain.setValueAtTime(0.4,t+beat*0.4);gs.gain.exponentialRampToValueAtTime(0.001,t+beat*0.5);os.connect(gs);gs.connect(lim);os.start(t);os.stop(t+beat*0.52);}
  const pads=[[130.8,164.8,196],[116.5,146.8,174.6],[123.5,155.6,185],[138.6,174.6,207.6]];let padIdx=0;
  function pad(t,notes){notes.forEach(f=>{const o1=AC.createOscillator(),o2=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;lp.Q.value=0.5;o1.type='sawtooth';o1.frequency.value=f;o2.type='sawtooth';o2.frequency.value=f*1.003;o1.connect(lp);o2.connect(lp);lp.connect(g);g.connect(rev);g.connect(mst);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.04,t+0.4);g.gain.setValueAtTime(0.04,t+beat*3.5);g.gain.linearRampToValueAtTime(0,t+beat*4.1);o1.start(t);o2.start(t);o1.stop(t+beat*4.2);o2.stop(t+beat*4.2);});}
  const leadSeq=[329.6,0,329.6,392,440,392,329.6,0,293.7,0,293.7,349.2,392,349.2,293.7,0,261.6,0,329.6,392,523.2,0,440,392,349.2,392,349.2,293.7,261.6,0,293.7,0];let leadIdx=0;
  function lead(t,f){if(!f)return;const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;const lfo=AC.createOscillator(),lg=AC.createGain();lfo.frequency.value=4.5;lg.gain.value=f*0.006;lfo.connect(lg);lg.connect(o.frequency);o.type='sawtooth';o.frequency.value=f;o.connect(lp);lp.connect(g);g.connect(rev);g.connect(mst);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.13,t+0.04);g.gain.setValueAtTime(0.13,t+beat*0.42);g.gain.exponentialRampToValueAtTime(0.001,t+beat*0.52);lfo.start(t);o.start(t);lfo.stop(t+beat*0.55);o.stop(t+beat*0.55);}
  function schedule(){if(!bgmRunning)return;const t=AC.currentTime+0.06,b16=beat/4;for(let i=0;i<4;i++)kick(t+i*beat);snare(t+beat);snare(t+beat*3);for(let i=0;i<16;i++){if(i%4===2)ohh(t+i*b16);else hh(t+i*b16,i%2===0?0.22:0.14);}for(let i=0;i<16;i++)bass(t+i*b16,leadIdx/2+i);pad(t,pads[padIdx%pads.length]);padIdx++;for(let i=0;i<8;i++)lead(t+i*beat/2,leadSeq[(leadIdx+i)%leadSeq.length]);leadIdx=(leadIdx+8)%leadSeq.length;bgmTimers.push(setTimeout(schedule,beat*4*1000-60));}
  schedule();
}

const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}

// ── SE ──
function playTapSE(color){
  try{
    resumeAC();const c=AC;
    const buf=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/c.sampleRate*140);
    const src=c.createBufferSource(),hi=c.createBiquadFilter(),g=c.createGain();
    src.buffer=buf;hi.type='highpass';hi.frequency.value=2500;g.gain.value=0.8;
    src.connect(hi);hi.connect(g);g.connect(c.destination);src.start();
    const o=c.createOscillator(),eg=c.createGain();
    o.type='square';o.frequency.value=2800;
    eg.gain.setValueAtTime(0.12,c.currentTime);eg.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.02);
    o.connect(eg);eg.connect(c.destination);o.start();o.stop(c.currentTime+0.025);
  }catch(e){}
}
function playMissSE(){
  resumeAC();const t=AC.currentTime;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(60,t+0.2);
  g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.start(t);o.stop(t+0.25);
}

function playBurstSE(){

function SlideCard({value,onPlay,disabled,cardRole,fieldBottom}){
  const[dragY,setDragY]=useState(0);
  const[isDragging,setIsDragging]=useState(false);
  const startYR=useRef(0),startedR=useRef(false),curYR=useRef(0);
  function onPointerDown(e){if(disabled)return;e.preventDefault();const t=e.touches?e.touches[0]:e;startYR.current=t.clientY;curYR.current=t.clientY;startedR.current=true;setIsDragging(true);setDragY(0);}
  function onPointerMove(e){if(!startedR.current||disabled)return;e.preventDefault();const t=e.touches?e.touches[0]:e;curYR.current=t.clientY;const dy=t.clientY-startYR.current;if(dy<0)setDragY(dy);}
  function onPointerUp(e){if(!startedR.current)return;startedR.current=false;setIsDragging(false);const dy=dragY;setDragY(0);if(disabled)return;if(fieldBottom!=null?curYR.current<fieldBottom:dy<-15)onPlay();}
  const cardBg=cardRole==='player'?'#0a1e3d':'#3d0a0a';
  const numColor=cardRole==='player'?'#4da8ff':'#ff6b6b';
  const borderN=cardRole==='player'?'#1a4080':'#801a1a';
  const reached=fieldBottom!=null&&isDragging&&curYR.current<fieldBottom;
  return h('div',{
    style:{width:50,height:70,borderRadius:7,flexShrink:0,background:disabled?'#111122':cardBg,
      border:disabled?'1.5px solid #333':(reached?'2px solid #50e080':'1.5px solid '+borderN),
      display:'flex',alignItems:'center',justifyContent:'center',opacity:disabled?0.3:1,
      animation:isDragging?'none':'dealIn 0.18s ease both',position:'relative',
      userSelect:'none',WebkitUserSelect:'none',touchAction:'none',cursor:disabled?'default':'grab',
      zIndex:isDragging?100:1,transform:isDragging?`translateY(${dragY}px) scale(1.1)`:'none',
      transition:isDragging?'none':'transform 0.2s ease',
      boxShadow:reached?'0 8px 24px #50e08099':'0 2px 8px #0004'},
    onPointerDown,onPointerMove,onPointerUp,onPointerCancel:onPointerUp,
  },
    h('span',{style:{fontSize:26,fontWeight:900,color:numColor,fontFamily:"'Playfair Display',serif",lineHeight:1,pointerEvents:'none'}},value),
    h('span',{style:{position:'absolute',top:2,left:4,fontSize:10,color:numColor,fontWeight:900,pointerEvents:'none'}},value),
    h('span',{style:{position:'absolute',bottom:2,right:4,fontSize:10,color:numColor,fontWeight:900,transform:'rotate(180deg)',pointerEvents:'none'}},value)
  );
}
function FieldCard({value,by}){

  const numColor=by==='player'?'#4da8ff':by==='dealer'?'#ff6b6b':CC[value];
  const borderColor=by==='player'?'#1a4080':by==='dealer'?'#801a1a':'#6040a0';

// ── App ──
function App(){
  const[phase,setPhase]=useState('menu');
  const[pH,setPH]=useState([]);
  const[dH,setDH]=useState([]);
  const[field,setField]=useState([]);
  const[fieldColors,setFieldColors]=useState([]);
  const[fieldSum,setFieldSum]=useState(0);
  const[pPt,setPPt]=useState(0);
  const[dPt,setDPt]=useState(0);
  const[rNum,setRNum]=useState(1);
  const[timeLeft,setTimeLeft]=useState(10);
  const[countNum,setCountNum]=useState(5);
  const[flashMsg,setFlashMsg]=useState(null);
  const[burstAnim,setBurstAnim]=useState(false);
  const[resetFA,setResetFA]=useState(false);
  const[comboShow,setComboShow]=useState(null);
  const[gameEndData,setGameEndData]=useState(null);
  const[musicEnabled,setMusicEnabled]=useState(false);
  const musicEnabledR=useRef(false);
  const[difficulty,setDifficulty]=useState('normal');
  const diffRef=useRef('normal');
  useEffect(()=>{diffRef.current=difficulty;},[difficulty]);

  // オンライン対戦
  const[onlinePhase,setOnlinePhase]=useState(''); // waiting|playing|end
  const[roomId,setRoomId]=useState('');
  const[onlineRole,setOnlineRole]=useState('');
  const[onMyHand,setOnMyHand]=useState([]);
  const[onOpHandCount,setOnOpHandCount]=useState(0);
  const[onField,setOnField]=useState([]);
  const[onFieldColors,setOnFieldColors]=useState([]);
  const[onFieldSum,setOnFieldSum]=useState(0);
  const[onMyPt,setOnMyPt]=useState(0);
  const[onOpPt,setOnOpPt]=useState(0);
  const[onRNum,setOnRNum]=useState(1);
  const[onTimeLeft,setOnTimeLeft]=useState(10);
  const[onCountNum,setOnCountNum]=useState(-1);
  const[onFlashMsg,setOnFlashMsg]=useState(null);
  const[onBurstAnim,setOnBurstAnim]=useState(false);
  const[onResetFA,setOnResetFA]=useState(false);
  const[onComboShow,setOnComboShow]=useState(null);
  const[onEndData,setOnEndData]=useState(null);
  const wsR=useRef(null);
  const onRoleR=useRef('');
  const onMyHandR=useRef([]);
  const onFieldR=useRef([]);
  const onFieldSumR=useRef(0);
  const onTimeLeftR=useRef(10);
  const onCountNumR=useRef(-1);
  const onFieldAreaRef=useRef(null);
  const aiRef=useRef(null),timerRef=useRef(null),countRef=useRef(null);
  const pPtR=useRef(0),dPtR=useRef(0);
  const pHR=useRef([]),dHR=useRef([]);
  const fieldR=useRef([]),fieldSumR=useRef(0);
  const fieldAreaRef=useRef(null);
  const phaseR=useRef('menu'),countNumR=useRef(-1),lockR=useRef(false);
  const aiFirstFastRef=useRef(true);

  useEffect(()=>{pPtR.current=pPt;},[pPt]);
  useEffect(()=>{dPtR.current=dPt;},[dPt]);
  useEffect(()=>{pHR.current=pH;},[pH]);
  useEffect(()=>{dHR.current=dH;},[dH]);
  useEffect(()=>{fieldR.current=field;},[field]);
  useEffect(()=>{fieldSumR.current=fieldSum;},[fieldSum]);
  useEffect(()=>{phaseR.current=phase;},[phase]);


  // ── オンライン接続 ──
  function onConnect(onOpen){
    const ws=new WebSocket(WS_URL);
    wsR.current=ws;
    ws.onopen=()=>onOpen(ws);
    ws.onmessage=(e)=>onMsg(JSON.parse(e.data));
    ws.onclose=()=>{if(['online_waiting','online_playing'].includes(phaseR.current)){alert('接続が切れました');goOnlineHome();}};
  }
  function onMsg(msg){
    switch(msg.type){
      case 'created':setRoomId(msg.roomId);setPhase('online_waiting');phaseR.current='online_waiting';break;
      case 'joined':setRoomId(msg.roomId);stopBGM();if(musicEnabledR.current){resumeAC();startBGM();}setPhase('online_playing');phaseR.current='online_playing';break;
      case 'guestJoined':stopBGM();if(musicEnabledR.current){resumeAC();startBGM();}setPhase('online_playing');phaseR.current='online_playing';break;
      case 'state':
        setOnMyHand(msg.myHand||[]);onMyHandR.current=msg.myHand||[];
        setOnOpHandCount(msg.opHandCount||0);
        setOnField(msg.field||[]);onFieldR.current=msg.field||[];setOnFieldColors([]);
        setOnFieldSum(msg.fieldSum||0);onFieldSumR.current=msg.fieldSum||0;
        setOnMyPt(msg.myPt||0);setOnOpPt(msg.opPt||0);
        setOnRNum(msg.rNum||1);setOnTimeLeft(msg.timeLeft||10);onTimeLeftR.current=msg.timeLeft||10;
        break;
      case 'countdown':onCountNumR.current=msg.value;setOnCountNum(msg.value);if(msg.value===0)try{resumeAC();const t=AC.currentTime;[[523,0,0.08],[659,0.09,0.08],[784,0.18,0.08],[1047,0.27,0.25]].forEach(([f,d,dur])=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.2,t+d);g.gain.exponentialRampToValueAtTime(0.001,t+d+dur);o.connect(g);g.connect(AC.destination);o.start(t+d);o.stop(t+d+dur+0.02);});}catch(e){}break;
      case 'timer':setOnTimeLeft(msg.value);onTimeLeftR.current=msg.value;if(msg.value===0)playMissSE();break;
      case 'field':setOnField(msg.field);onFieldR.current=msg.field;setOnFieldSum(msg.fieldSum);onFieldSumR.current=msg.fieldSum;break;
      case 'handUpdate':const nh=[...onMyHandR.current];nh[msg.idx]=0;setOnMyHand(nh);onMyHandR.current=nh;break;
      case 'newHand':setOnMyHand(msg.hand);onMyHandR.current=msg.hand;break;
      case 'fieldUpdate':setOnField(msg.field);onFieldR.current=msg.field;setOnFieldSum(msg.fieldSum);onFieldSumR.current=msg.fieldSum;break;
      case 'opPlay':
        setOnField(msg.field);onFieldR.current=msg.field;setOnFieldSum(msg.fieldSum);onFieldSumR.current=msg.fieldSum;
        setOnFieldColors(prev=>[...prev,onRoleR.current==='host'?'guest':'host']);
        resumeAC();playTapSE();setOnOpHandCount(c=>Math.max(0,c-1));break;
      case 'burst':
        resumeAC();playBurstSE();setOnBurstAnim(true);
        const ib=msg.msg.by===onRoleR.current;
        setOnFlashMsg({text:ib?'💥 バースト！あなた-2pt':'💥 相手バースト！相手-2pt',who:ib?'player':'dealer'});
        if(onRoleR.current==='host'){setOnMyPt(msg.hostPt);setOnOpPt(msg.guestPt);}else{setOnMyPt(msg.guestPt);setOnOpPt(msg.hostPt);}
        setTimeout(()=>{setOnBurstAnim(false);setOnFlashMsg(null);},1000);break;
      case 'score':
        if(msg.voice)playComboSfx(msg.voice);
        setOnResetFA(true);setOnComboShow(msg.combo);
        const isMy=msg.msg?.by===onRoleR.current;
        setOnFlashMsg({text:(isMy?'🙋 YOU +':'👤 相手 +')+msg.combo.pts+'pt',who:isMy?'player':'dealer'});
        if(onRoleR.current==='host'){setOnMyPt(msg.hostPt);setOnOpPt(msg.guestPt);}else{setOnMyPt(msg.guestPt);setOnOpPt(msg.hostPt);}
        setTimeout(()=>setOnComboShow(null),1200);setTimeout(()=>{setOnResetFA(false);setOnFlashMsg(null);},1400);break;
      case 'comboEnd':setOnComboShow(null);break;
      case 'forceReset':setOnResetFA(true);setOnFlashMsg({text:'4枚！強制リセット',who:null});setTimeout(()=>{setOnResetFA(false);setOnFlashMsg(null);},900);break;
      case 'finish':
        const isMe=msg.winner===onRoleR.current;
        setOnEndData({winner:isMe?'me':'op',myPt:onRoleR.current==='host'?msg.hostPt:msg.guestPt,opPt:onRoleR.current==='host'?msg.guestPt:msg.hostPt});
        stopBGM();setPhase('online_end');phaseR.current='online_end';break;
      case 'opLeft':alert('相手が退出しました');goOnlineHome();break;
      case 'error':alert(msg.msg);break;
    }
  }
  function createRoom(){onRoleR.current='host';onConnect(ws=>ws.send(JSON.stringify({type:'create'})));}
  function joinRoom(code){onRoleR.current='guest';onConnect(ws=>ws.send(JSON.stringify({type:'join',roomId:code})));}
  function onlinePlayCard(idx,value){
    if(onCountNumR.current>=0||onTimeLeftR.current<=0)return;
    if(!wsR.current||wsR.current.readyState!==WebSocket.OPEN)return;
    if(!onMyHandR.current[idx])return;
    if(!canPlay(value,onFieldSumR.current,onFieldR.current))return;
    resumeAC();playTapSE();
    const nh=[...onMyHandR.current];nh[idx]=0;setOnMyHand(nh);onMyHandR.current=nh;
    const nf=[...onFieldR.current,value];const ns=onFieldSumR.current+value;
    setOnField(nf);onFieldR.current=nf;setOnFieldSum(ns);onFieldSumR.current=ns;
    setOnFieldColors(prev=>[...prev,onRoleR.current]);
    wsR.current.send(JSON.stringify({type:'play',idx,value}));
  }
  function goOnlineHome(){
    if(wsR.current){try{wsR.current.send(JSON.stringify({type:'leave'}));}catch(e){}wsR.current.close();wsR.current=null;}
    stopBGM();setPhase('menu');phaseR.current='menu';
    setOnMyHand([]);setOnField([]);setOnFieldColors([]);setOnFieldSum(0);setOnMyPt(0);setOnOpPt(0);
    setOnCountNum(-1);onCountNumR.current=-1;setOnFlashMsg(null);setOnEndData(null);
  }
  function showOnlineMenu(){
    // ルーム作成/入室選択
    const code=window.prompt('ルームコードを入力（作る場合は空欄）');
    if(code===null)return;
    if(code.trim()===''){createRoom();}
    else{joinRoom(code.trim());}
  }

  function toggleMusic(){if(musicEnabledR.current){stopBGM();musicEnabledR.current=false;setMusicEnabled(false);}else{musicEnabledR.current=true;setMusicEnabled(true);resumeAC();if(phaseR.current==='playing'||phaseR.current==='online_playing')startBGM();}}
  function clearTimers(){clearTimeout(aiRef.current);clearInterval(timerRef.current);clearTimeout(countRef.current);}
  useEffect(()=>()=>clearTimers(),[]);

  function startGame(diff){
    if(diff){setDifficulty(diff);diffRef.current=diff;}
    clearTimers();lockR.current=false;
    const p=createDeck(),d=createDeck();
    setPH(p);setDH(d);pHR.current=p;dHR.current=d;
    setPPt(0);setDPt(0);pPtR.current=0;dPtR.current=0;
    setRNum(1);setField([]);setFieldSum(0);fieldR.current=[];fieldSumR.current=0;
    setFlashMsg(null);setBurstAnim(false);setResetFA(false);setGameEndData(null);
    if(musicEnabledR.current)startBGM();doCountdown(p,d,0,0,1);
  }

  function doCountdown(pHand,dHand,pp,dp,rn){
    setPhase('playing');phaseR.current='playing';
    setField([]);setFieldSum(0);fieldR.current=[];fieldSumR.current=0;
    setFlashMsg(null);setTimeLeft(10);
    let c=5;setCountNum(c);countNumR.current=c;
    function tick(){
      setCountNum(c);countNumR.current=c;
      if(c===0){
        // GO！音
        try{resumeAC();const t=AC.currentTime;
          [[523,0,0.08],[659,0.09,0.08],[784,0.18,0.08],[1047,0.27,0.25]].forEach(([f,d,dur])=>{
            const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;
            g.gain.setValueAtTime(0.2,t+d);g.gain.exponentialRampToValueAtTime(0.001,t+d+dur);
            o.connect(g);g.connect(AC.destination);o.start(t+d);o.stop(t+d+dur+0.02);
          });
        }catch(e){}
        setTimeout(()=>{
          setCountNum(-1);countNumR.current=-1;
          aiFirstFastRef.current=Math.random()<0.90;
          startTimer(rn);
          if(Math.random()<0.50){lockR.current=true;scheduleAi(rn,120);setTimeout(()=>{lockR.current=false;},400);}
          else{lockR.current=false;scheduleAi(rn,120);}
        },650);
        return;
      }
      c--;countRef.current=setTimeout(tick,650);
    }
    tick();
  }

  function startTimer(rn){
    clearInterval(timerRef.current);
    let t=10;setTimeLeft(t);
    timerRef.current=setInterval(()=>{
      t--;setTimeLeft(t);
      if(t<=0){clearInterval(timerRef.current);clearTimeout(aiRef.current);doTimeUp(rn);}
    },1000);
  }

  function doTimeUp(rn){
    resumeAC();playMissSE();
    setFlashMsg({text:'⏱ 時間切れ！引き分け（±0pt）',color:DIM});
    const newP=createDeck(),newD=createDeck();
    setPH(newP);setDH(newD);pHR.current=newP;dHR.current=newD;
    setTimeout(()=>{
      setFlashMsg(null);
      const pp=pPtR.current,dp=dPtR.current;
      if(pp>=WIN_PT||dp>=WIN_PT){endGame(pp,dp);return;}
      const nr=rn+1;setRNum(nr);doCountdown(newP,newD,pp,dp,nr);
    },1600);
  }

  function scheduleAi(rn,delay=null){
    clearTimeout(aiRef.current);
    let d;
    if(delay!==null){d=delay;}
    else{
      const cf=fieldR.current,cs=fieldSumR.current,fl=cf.length;
      const canWin=dHR.current.some(v=>canPlay(v,cs,cf)&&cs+v===10);
      const diff=diffRef.current;
      if(canWin)d=diff==='easy'?600+Math.random()*800:diff==='hard'?50+Math.random()*100:100+Math.random()*200;
      else if(fl===0){if(diff==='easy')d=800+Math.random()*800;else if(diff==='hard')d=150+Math.random()*200;else d=aiFirstFastRef.current?300+Math.random()*300:1200+Math.random()*800;}
      else if(fl===1)d=diff==='easy'?1000+Math.random()*600:diff==='hard'?400+Math.random()*200:1000+Math.random()*400;
      else d=diff==='easy'?1200+Math.random()*800:diff==='hard'?600+Math.random()*300:1500+Math.random()*500;
    }
    aiRef.current=setTimeout(()=>{if(phaseR.current==='playing'&&countNumR.current<0)aiPlay(rn);},d);
  }

  function aiPlay(rn){
    const dHand=dHR.current,cf=fieldR.current,cs=fieldSumR.current;
    if(!dHand.length)return;
    const playable=dHand.filter(v=>canPlay(v,cs,cf));
    if(!playable.length){scheduleAi(rn);return;}
    const wins=playable.filter(v=>cs+v===10);
    const safe=playable.filter(v=>cs+v<10);
    const diff=diffRef.current;
    const winRate  =diff==='easy'?0.60:diff==='hard'?0.97:0.85;
    const safeRate5=diff==='easy'?0.25:diff==='hard'?0.60:0.35;
    const safeBase =diff==='easy'?0.35:diff==='hard'?0.70:0.40;
    const safeCap  =diff==='easy'?0.50:diff==='hard'?0.90:0.65;
    const firstRate=diff==='easy'?0.45:diff==='hard'?0.80:0.55;
    let chosen=null;
    if(wins.length&&Math.random()<winRate)chosen=wins.reduce((b,v)=>calcPts([...cf,v]).total>calcPts([...cf,b]).total?v:b,wins[0]);
    else if(cs>=8){if(diff==='hard'&&Math.random()<0.15&&safe.length)chosen=safe[Math.floor(Math.random()*safe.length)];}
    else if(cs>=5){if(Math.random()<safeRate5&&safe.length)chosen=safe[Math.floor(Math.random()*safe.length)];}
    else if(cs>=1){if(Math.random()<Math.min(safeBase+cf.length*0.08,safeCap)&&safe.length)chosen=safe[Math.floor(Math.random()*safe.length)];}
    else{if(Math.random()<firstRate&&safe.length)chosen=safe.sort((a,b)=>a-b)[0];}
    if(!chosen){scheduleAi(rn);return;}
    resumeAC();playTapSE();
    const idx=dHand.indexOf(chosen);
    const newDH=dHand.filter((_,i)=>i!==idx);
    setDH(newDH);dHR.current=newDH;
    if(!newDH.length){const nd=createDeck();setDH(nd);dHR.current=nd;}

        h('div',{key:k,style:{fontSize:9,color:DIM,fontFamily:"'Fira Code',monospace",background:'#ffffff22',borderRadius:4,padding:'2px 5px',whiteSpace:'nowrap'}},
          h('span',{style:{color:PINK,fontWeight:700}},k),':',v)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
